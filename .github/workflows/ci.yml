name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    if: github.repository == '8tentaculos/cssfun'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # `npm ci` runs `prepare` (clean + test + build) and the `posttest`
      # hook (lint + type tests), so this single step covers the whole suite.
      - name: Install, test and build
        run: npm ci
